name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: pc-novel-reader-macos
            build_command: pnpm tauri:build:mac-app
          - name: Windows
            os: windows-latest
            artifact_name: pc-novel-reader-windows
            build_command: pnpm tauri:build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: ${{ matrix.build_command }}

      - name: Package macOS app
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p release-assets
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/PC Novel Reader.app" \
            "release-assets/PC-Novel-Reader-${{ github.ref_name }}-macOS-arm64.zip"

      - name: Package Windows installers
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          Get-ChildItem -Path src-tauri\target\release\bundle -Recurse -Include *.msi,*.exe |
            Copy-Item -Destination release-assets

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          files: release-assets/*
